<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Nowoczesna aplikacja pogodowa z prognoza godzinowa, 7-dniowa i jakoscia powietrza.">
<title>Pogoda | Prognoza i AQI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="container">
    <div class="logo">Pogoda</div>
    <nav class="header-controls" aria-label="Sterowanie aplikacja pogodowa">
      <div class="search-wrapper">
        <label for="searchInput" class="visually-hidden">Szukaj miasta</label>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Szukaj miasta..."
          autocomplete="off"
          role="combobox"
          aria-autocomplete="list"
          aria-expanded="false"
          aria-controls="autocomplete"
          aria-label="Szukaj miasta"
        >
        <div class="autocomplete" id="autocomplete" role="listbox" aria-label="Propozycje miast"></div>
      </div>
      <button class="btn" id="langBtn" type="button" aria-label="Przelacz jezyk">PL</button>
      <button class="btn" id="geoBtn" type="button" aria-label="Uzyj mojej lokalizacji">Lokalizacja</button>
      <button class="btn" id="unitBtn" type="button" aria-label="Przelacz jednostki temperatury" aria-pressed="false">&deg;C</button>
      <button class="btn btn--filled" id="themeBtn" type="button" aria-label="Przelacz motyw jasny i ciemny" aria-pressed="false">Motyw</button>
    </nav>
  </div>
</header>

<main class="container">
  <div class="main-grid" id="app">
    <div class="loading-text col-12" role="status" aria-live="polite">Ladowanie danych...</div>

    <div class="skeleton-card col-6 skeleton-h-280" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line skeleton-line--lg"></div>
        <div class="skeleton-spacer-24"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>

    <div class="skeleton-card col-6 skeleton-h-280" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>

    <div class="skeleton-card col-12 skeleton-h-170" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>

    <div class="skeleton-card col-12 skeleton-h-210" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>

    <div class="skeleton-card col-8 skeleton-h-210" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>

    <div class="skeleton-card col-4 skeleton-h-210" aria-hidden="true">
      <div class="skeleton-row">
        <div class="skeleton-line skeleton-line--md"></div>
        <div class="skeleton-line skeleton-line--lg"></div>
      </div>
    </div>
  </div>
</main>

<div id="srStatus" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>

<footer>
  <div class="container">
    <a href="https://github.com/w3ziqv" target="_blank" rel="noopener noreferrer">GitHub</a>
    <span class="footer-text">Open-Meteo API - Swiss Design</span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
