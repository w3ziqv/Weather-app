<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pogoda — Swiss Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FFFFFF;
    --bg-alt: #F5F5F5;
    --fg: #111111;
    --fg-muted: #888888;
    --border: #000000;
    --card-bg: #FFFFFF;
    --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #111111;
    --bg-alt: #1a1a1a;
    --fg: #FFFFFF;
    --fg-muted: #888888;
    --border: #FFFFFF;
    --card-bg: #111111;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    transition: background 0.15s, color 0.15s;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .label {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    margin-bottom: 4px;
  }

  .big-number {
    font-size: 6rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    font-family: var(--font);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover {
    background: var(--fg);
    color: var(--bg);
  }
  .btn--filled {
    background: var(--fg);
    color: var(--bg);
  }
  .btn--filled:hover {
    background: transparent;
    color: var(--fg);
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    max-width: 360px;
    min-width: 200px;
  }
  .search-input {
    font-family: var(--font);
    font-size: 0.8125rem;
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    outline: none;
    letter-spacing: 0.02em;
  }
  .search-input::placeholder { color: var(--fg-muted); }
  .autocomplete {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    z-index: 100;
    display: none;
  }
  .autocomplete.active { display: block; }
  .autocomplete-item {
    padding: 8px 12px;
    font-size: 0.8125rem;
    cursor: pointer;
    border-bottom: 1px solid var(--bg-alt);
  }
  .autocomplete-item:hover,
  .autocomplete-item.active {
    background: var(--bg-alt);
  }
  .autocomplete-item:last-child { border-bottom: none; }

  .card {
    border: 1px solid var(--border);
    padding: 24px;
    background: var(--card-bg);
  }

  .main-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0;
    margin-top: -1px;
  }
  .main-grid > * {
    margin-top: -1px;
    margin-left: -1px;
  }
  .main-grid { padding-left: 1px; }

  .col-4 { grid-column: span 4; }
  .col-6 { grid-column: span 6; }
  .col-8 { grid-column: span 8; }
  .col-12 { grid-column: span 12; }

  .current-weather {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 280px;
  }
  .current-weather .temp-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .current-weather .weather-icon svg {
    width: 72px;
    height: 72px;
  }
  .current-weather .description {
    font-size: 1.125rem;
    font-weight: 500;
    margin-top: 8px;
  }
  .current-weather .city-name {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .current-weather .date-time {
    font-size: 0.75rem;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .stat-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--bg-alt);
  }
  .stat-item:not(:nth-child(3n+1)) { padding-left: 12px; border-left: 1px solid var(--bg-alt); }
  .stat-item:not(:nth-child(3n)) { padding-right: 12px; }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .sun-times {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .sun-time-value {
    font-size: 1.25rem;
    font-weight: 700;
  }
  .sun-progress-track {
    width: 100%;
    height: 3px;
    background: var(--bg-alt);
    position: relative;
    margin-top: 12px;
  }
  .sun-progress-bar {
    height: 100%;
    background: var(--fg);
    width: 0%;
    transition: width 1s ease;
  }
  .sun-progress-dot {
    width: 10px;
    height: 10px;
    background: var(--fg);
    border-radius: 50%;
    position: absolute;
    top: -3.5px;
    left: 0%;
    transition: left 1s ease;
  }

  .hourly-scroll {
    display: flex;
    overflow-x: auto;
    gap: 0;
    -ms-overflow-style: none;
    scrollbar-width: thin;
  }
  .hourly-scroll::-webkit-scrollbar { height: 2px; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--fg-muted); }
  .hourly-item {
    min-width: 80px;
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--bg-alt);
    flex-shrink: 0;
  }
  .hourly-item:last-child { border-right: none; }
  .hourly-time {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
    margin-bottom: 8px;
  }
  .hourly-temp {
    font-size: 1.125rem;
    font-weight: 700;
  }
  .hourly-icon svg {
    width: 28px;
    height: 28px;
    margin: 6px 0;
  }
  .hourly-precip {
    font-size: 0.625rem;
    color: var(--fg-muted);
    margin-top: 4px;
  }

  .forecast-table {
    width: 100%;
    border-collapse: collapse;
  }
  .forecast-table th {
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg-muted);
    text-align: left;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .forecast-table td {
    padding: 10px 0;
    font-size: 0.875rem;
    border-bottom: 1px solid var(--bg-alt);
    vertical-align: middle;
  }
  .forecast-table .day-name {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.8125rem;
  }
  .forecast-table .temp-max { font-weight: 700; }
  .forecast-table .temp-min { color: var(--fg-muted); }
  .forecast-table svg { width: 24px; height: 24px; vertical-align: middle; }

  .chart-container {
    width: 100%;
    overflow-x: auto;
  }
  .chart-container svg {
    display: block;
    width: 100%;
    min-width: 500px;
    height: 200px;
  }
  .chart-line { fill: none; stroke: var(--fg); stroke-width: 2; }
  .chart-dot { fill: var(--fg); }
  .chart-grid-line { stroke: var(--bg-alt); stroke-width: 1; }
  .chart-label {
    font-family: var(--font);
    font-size: 10px;
    fill: var(--fg-muted);
    text-anchor: middle;
  }
  .chart-value-label {
    font-family: var(--font);
    font-size: 9px;
    fill: var(--fg);
    text-anchor: middle;
    font-weight: 600;
  }

  .aqi-value {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .aqi-desc {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }
  .aqi-bar-track {
    width: 100%;
    height: 4px;
    background: var(--bg-alt);
    margin-top: 16px;
  }
  .aqi-bar-fill {
    height: 100%;
    background: var(--fg);
    transition: width 0.8s ease;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    margin-top: -1px;
  }
  footer .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  footer a {
    color: var(--fg);
    text-decoration: none;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  footer a:hover { text-decoration: underline; }
  footer .footer-text {
    font-size: 0.6875rem;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .loading-text {
    font-size: 0.75rem;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 40px 0;
    text-align: center;
  }

  @media (max-width: 768px) {
    .main-grid > * { grid-column: span 12 !important; }
    .big-number { font-size: 4rem; }
    .header-controls { flex-wrap: wrap; }
    .search-wrapper { max-width: 100%; min-width: 0; order: 10; flex-basis: 100%; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .current-weather { min-height: auto; }
    footer .container { justify-content: center; text-align: center; }
  }

  @media (max-width: 480px) {
    .big-number { font-size: 3.5rem; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo">Pogoda</div>
    <div class="header-controls">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Szukaj miasta…" autocomplete="off">
        <div class="autocomplete" id="autocomplete"></div>
      </div>
      <button class="btn" id="geoBtn" title="Moja lokalizacja">&#9678; Lokalizacja</button>
      <button class="btn" id="unitBtn">°C</button>
      <button class="btn btn--filled" id="themeBtn">&#9679;</button>
    </div>
  </div>
</header>

<main class="container">
  <div class="main-grid" id="app">
    <div class="loading-text col-12">Ładowanie danych…</div>
  </div>
</main>

<footer>
  <div class="container">
    <a href="https://github.com/w3ziqv" target="_blank" rel="noopener noreferrer">GitHub</a>
    <span class="footer-text">Open-Meteo API · Swiss Design</span>
  </div>
</footer>

<script>
(function() {
  'use strict';

  let state = {
    lat: 52.23,
    lon: 21.01,
    cityName: 'Warszawa',
    unit: 'C',
    weather: null,
    aqi: null
  };

  const themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', () => {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  });

  const unitBtn = document.getElementById('unitBtn');
  unitBtn.addEventListener('click', () => {
    state.unit = state.unit === 'C' ? 'F' : 'C';
    unitBtn.textContent = '°' + state.unit;
    if (state.weather) render();
  });

  const geoBtn = document.getElementById('geoBtn');
  geoBtn.addEventListener('click', () => {
    if (!navigator.geolocation) return;
    geoBtn.textContent = '…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        state.lat = Math.round(pos.coords.latitude * 100) / 100;
        state.lon = Math.round(pos.coords.longitude * 100) / 100;
        state.cityName = 'Moja lokalizacja';
        geoBtn.textContent = '\u25CE Lokalizacja';
        fetchAll();
      },
      () => { geoBtn.textContent = '\u25CE Lokalizacja'; }
    );
  });

  const searchInput = document.getElementById('searchInput');
  const autocompleteEl = document.getElementById('autocomplete');
  let searchTimeout = null;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) { autocompleteEl.classList.remove('active'); return; }
    searchTimeout = setTimeout(() => {
      const url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(q) + '&count=5&language=pl';
      fetch(url).then(r => r.json()).then(data => {
        if (!data.results || !data.results.length) {
          autocompleteEl.classList.remove('active');
          return;
        }
        autocompleteEl.innerHTML = '';
        data.results.forEach(r => {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          div.textContent = r.name + (r.admin1 ? ', ' + r.admin1 : '') + (r.country ? ' — ' + r.country : '');
          div.addEventListener('click', () => {
            state.lat = r.latitude;
            state.lon = r.longitude;
            state.cityName = r.name;
            searchInput.value = '';
            autocompleteEl.classList.remove('active');
            fetchAll();
          });
          autocompleteEl.appendChild(div);
        });
        autocompleteEl.classList.add('active');
      }).catch(() => {});
    }, 300);
  });

  document.addEventListener('click', (e) => {
    if (!autocompleteEl.contains(e.target) && e.target !== searchInput) {
      autocompleteEl.classList.remove('active');
    }
  });

  let acIndex = -1;
  searchInput.addEventListener('keydown', (e) => {
    const items = autocompleteEl.querySelectorAll('.autocomplete-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIndex = Math.min(acIndex + 1, items.length - 1);
      items.forEach((it, i) => it.classList.toggle('active', i === acIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIndex = Math.max(acIndex - 1, 0);
      items.forEach((it, i) => it.classList.toggle('active', i === acIndex));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (acIndex >= 0 && items[acIndex]) items[acIndex].click();
    } else if (e.key === 'Escape') {
      autocompleteEl.classList.remove('active');
      acIndex = -1;
    }
  });
  const acObserver = new MutationObserver(() => { acIndex = -1; });
  acObserver.observe(autocompleteEl, { childList: true });

  function toUnit(celsius) {
    if (state.unit === 'F') return Math.round(celsius * 9 / 5 + 32);
    return Math.round(celsius);
  }
  function unitSymbol() { return '°' + state.unit; }

  function weatherInfo(code) {
    const map = {
      0: { desc: 'Bezchmurnie', icon: iconSun },
      1: { desc: 'Przeważnie czyste', icon: iconSunCloud },
      2: { desc: 'Częściowe zachmurzenie', icon: iconSunCloud },
      3: { desc: 'Pochmurno', icon: iconCloud },
      45: { desc: 'Mgła', icon: iconFog },
      48: { desc: 'Mgła szronowa', icon: iconFog },
      51: { desc: 'Lekka mżawka', icon: iconDrizzle },
      53: { desc: 'Umiarkowana mżawka', icon: iconDrizzle },
      55: { desc: 'Gęsta mżawka', icon: iconDrizzle },
      56: { desc: 'Mżawka marznąca', icon: iconDrizzle },
      57: { desc: 'Gęsta mżawka marznąca', icon: iconDrizzle },
      61: { desc: 'Lekki deszcz', icon: iconRain },
      63: { desc: 'Umiarkowany deszcz', icon: iconRain },
      65: { desc: 'Silny deszcz', icon: iconRain },
      66: { desc: 'Deszcz marznący', icon: iconRain },
      67: { desc: 'Silny deszcz marznący', icon: iconRain },
      71: { desc: 'Lekki śnieg', icon: iconSnow },
      73: { desc: 'Umiarkowany śnieg', icon: iconSnow },
      75: { desc: 'Silny śnieg', icon: iconSnow },
      77: { desc: 'Ziarna śniegu', icon: iconSnow },
      80: { desc: 'Lekkie opady', icon: iconRain },
      81: { desc: 'Umiarkowane opady', icon: iconRain },
      82: { desc: 'Gwałtowne opady', icon: iconRain },
      85: { desc: 'Lekkie opady śniegu', icon: iconSnow },
      86: { desc: 'Silne opady śniegu', icon: iconSnow },
      95: { desc: 'Burza', icon: iconStorm },
      96: { desc: 'Burza z gradem', icon: iconStorm },
      99: { desc: 'Burza z silnym gradem', icon: iconStorm }
    };
    return map[code] || { desc: 'Nieznane', icon: iconCloud };
  }

  function iconSun() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="10" stroke="currentColor" stroke-width="2.5"/><line x1="24" y1="2" x2="24" y2="8" stroke="currentColor" stroke-width="2.5"/><line x1="24" y1="40" x2="24" y2="46" stroke="currentColor" stroke-width="2.5"/><line x1="2" y1="24" x2="8" y2="24" stroke="currentColor" stroke-width="2.5"/><line x1="40" y1="24" x2="46" y2="24" stroke="currentColor" stroke-width="2.5"/><line x1="8.3" y1="8.3" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="2.5"/><line x1="35.5" y1="35.5" x2="39.7" y2="39.7" stroke="currentColor" stroke-width="2.5"/><line x1="8.3" y1="39.7" x2="12.5" y2="35.5" stroke="currentColor" stroke-width="2.5"/><line x1="35.5" y1="12.5" x2="39.7" y2="8.3" stroke="currentColor" stroke-width="2.5"/></svg>';
  }
  function iconSunCloud() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="16" r="7" stroke="currentColor" stroke-width="2"/><line x1="18" y1="4" x2="18" y2="6" stroke="currentColor" stroke-width="2"/><line x1="18" y1="26" x2="18" y2="28" stroke="currentColor" stroke-width="2"/><line x1="8" y1="16" x2="6" y2="16" stroke="currentColor" stroke-width="2"/><line x1="30" y1="16" x2="28" y2="16" stroke="currentColor" stroke-width="2"/><path d="M14 30 C14 26 18 22 24 22 C28 22 31 24 32 27 C36 27.5 39 30 39 34 C39 38 36 40 32 40 L18 40 C14 40 12 37 12 34 C12 32 13 30.5 14 30Z" stroke="currentColor" stroke-width="2"/></svg>';
  }
  function iconCloud() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 32 C8 32 6 29 6 26 C6 23 8 20 12 20 C12 14 17 10 23 10 C28 10 32 13 33 18 C37 18.5 40 21 40 25 C40 29 37 32 33 32Z" stroke="currentColor" stroke-width="2.5"/></svg>';
  }
  function iconFog() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="8" y1="18" x2="40" y2="18" stroke="currentColor" stroke-width="2.5"/><line x1="6" y1="24" x2="42" y2="24" stroke="currentColor" stroke-width="2.5"/><line x1="10" y1="30" x2="38" y2="30" stroke="currentColor" stroke-width="2.5"/><line x1="14" y1="36" x2="34" y2="36" stroke="currentColor" stroke-width="2.5"/></svg>';
  }
  function iconDrizzle() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 26 C8 26 6 23 6 20 C6 17 8 14 12 14 C12 8 17 4 23 4 C28 4 32 7 33 12 C37 12.5 40 15 40 19 C40 23 37 26 33 26Z" stroke="currentColor" stroke-width="2"/><line x1="14" y1="32" x2="13" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="22" y1="32" x2="21" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="30" y1="32" x2="29" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
  }
  function iconRain() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 24 C8 24 6 21 6 18 C6 15 8 12 12 12 C12 6 17 2 23 2 C28 2 32 5 33 10 C37 10.5 40 13 40 17 C40 21 37 24 33 24Z" stroke="currentColor" stroke-width="2"/><line x1="14" y1="30" x2="12" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="23" y1="30" x2="21" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="30" x2="30" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>';
  }
  function iconSnow() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 24 C8 24 6 21 6 18 C6 15 8 12 12 12 C12 6 17 2 23 2 C28 2 32 5 33 10 C37 10.5 40 13 40 17 C40 21 37 24 33 24Z" stroke="currentColor" stroke-width="2"/><circle cx="14" cy="33" r="2" fill="currentColor"/><circle cx="24" cy="33" r="2" fill="currentColor"/><circle cx="34" cy="33" r="2" fill="currentColor"/><circle cx="19" cy="40" r="2" fill="currentColor"/><circle cx="29" cy="40" r="2" fill="currentColor"/></svg>';
  }
  function iconStorm() {
    return '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22 C8 22 6 19 6 16 C6 13 8 10 12 10 C12 4 17 0 23 0 C28 0 32 3 33 8 C37 8.5 40 11 40 15 C40 19 37 22 33 22Z" stroke="currentColor" stroke-width="2"/><polygon points="22,26 18,36 23,36 20,46 30,33 25,33 28,26" fill="currentColor"/></svg>';
  }

  function fetchAll() {
    const weatherUrl = 'https://api.open-meteo.com/v1/forecast?latitude=' + state.lat
      + '&longitude=' + state.lon
      + '&current_weather=true'
      + '&hourly=temperature_2m,precipitation_probability,windspeed_10m,uv_index,visibility,relativehumidity_2m,surface_pressure,weathercode'
      + '&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset,weathercode'
      + '&timezone=auto&forecast_days=7';

    const aqiUrl = 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + state.lat
      + '&longitude=' + state.lon
      + '&current=european_aqi'
      + '&hourly=european_aqi'
      + '&timezone=auto';

    document.getElementById('app').innerHTML = '<div class="loading-text col-12">Ładowanie danych…</div>';

    Promise.all([
      fetch(weatherUrl).then(r => r.json()),
      fetch(aqiUrl).then(r => r.json()).catch(() => null)
    ]).then(([weather, aqi]) => {
      state.weather = weather;
      state.aqi = aqi;
      render();
    }).catch(() => {
      document.getElementById('app').innerHTML = '<div class="loading-text col-12">Błąd pobierania danych. Spróbuj ponownie.</div>';
    });
  }

  function aqiDescription(val) {
    if (val <= 20) return 'Bardzo dobra';
    if (val <= 40) return 'Dobra';
    if (val <= 60) return 'Umiarkowana';
    if (val <= 80) return 'Zła';
    if (val <= 100) return 'Bardzo zła';
    return 'Niebezpieczna';
  }
  function aqiPercent(val) {
    return Math.min(100, Math.round((val / 150) * 100));
  }

  function shortDay(dateStr) {
    const days = ['Ndz', 'Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob'];
    const d = new Date(dateStr + 'T00:00:00');
    return days[d.getDay()];
  }

  function getCurrentHourIndex(times) {
    const now = new Date();
    let best = 0;
    let bestDiff = Infinity;
    for (let i = 0; i < times.length; i++) {
      const t = new Date(times[i]);
      const diff = Math.abs(now - t);
      if (diff < bestDiff) { bestDiff = diff; best = i; }
    }
    return best;
  }

  function formatHour(isoStr) {
    const d = new Date(isoStr);
    return String(d.getHours()).padStart(2, '0') + ':00';
  }
  function formatSunTime(isoStr) {
    const d = new Date(isoStr);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function buildTempChart(hourlyTimes, hourlyTemps, startIdx) {
    const count = 24;
    const temps = [];
    const labels = [];
    for (let i = 0; i < count; i += 2) {
      const idx = startIdx + i;
      if (idx < hourlyTemps.length) {
        temps.push(toUnit(hourlyTemps[idx]));
        labels.push(formatHour(hourlyTimes[idx]));
      }
    }

    if (temps.length === 0) return '';

    const w = 700, h = 180, padTop = 30, padBot = 30, padLeft = 10, padRight = 10;
    const minT = Math.min(...temps) - 2;
    const maxT = Math.max(...temps) + 2;
    const rangeT = maxT - minT || 1;
    const stepX = (w - padLeft - padRight) / (temps.length - 1 || 1);

    const points = temps.map((t, i) => {
      const x = padLeft + i * stepX;
      const y = padTop + (1 - (t - minT) / rangeT) * (h - padTop - padBot);
      return { x, y, temp: t, label: labels[i] };
    });

    const pathD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');

    let svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg">';

    for (let i = 0; i <= 4; i++) {
      const y = padTop + (i / 4) * (h - padTop - padBot);
      svg += '<line x1="' + padLeft + '" y1="' + y.toFixed(1) + '" x2="' + (w - padRight) + '" y2="' + y.toFixed(1) + '" class="chart-grid-line"/>';
    }

    svg += '<path d="' + pathD + '" class="chart-line"/>';

    points.forEach(p => {
      svg += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.5" class="chart-dot"/>';
      svg += '<text x="' + p.x.toFixed(1) + '" y="' + (p.y - 10).toFixed(1) + '" class="chart-value-label">' + p.temp + '°</text>';
      svg += '<text x="' + p.x.toFixed(1) + '" y="' + (h - 6) + '" class="chart-label">' + p.label + '</text>';
    });

    svg += '</svg>';
    return svg;
  }

  function sunProgress(sunrise, sunset) {
    const now = new Date();
    const rise = new Date(sunrise);
    const set = new Date(sunset);
    if (now < rise) return 0;
    if (now > set) return 100;
    return Math.round(((now - rise) / (set - rise)) * 100);
  }

  function render() {
    const w = state.weather;
    const a = state.aqi;
    if (!w) return;

    const cw = w.current_weather;
    const info = weatherInfo(cw.weathercode);
    const hourIdx = getCurrentHourIndex(w.hourly.time);

    const humidity = w.hourly.relativehumidity_2m ? w.hourly.relativehumidity_2m[hourIdx] : '—';
    const uvIndex = w.hourly.uv_index ? w.hourly.uv_index[hourIdx] : '—';
    const visibility = w.hourly.visibility ? (w.hourly.visibility[hourIdx] / 1000).toFixed(1) : '—';
    const pressure = w.hourly.surface_pressure ? Math.round(w.hourly.surface_pressure[hourIdx]) : '—';
    const windSpeed = cw.windspeed;

    let aqiVal = '—';
    if (a && a.current && a.current.european_aqi != null) {
      aqiVal = a.current.european_aqi;
    } else if (a && a.hourly && a.hourly.european_aqi) {
      const aqiIdx = getCurrentHourIndex(a.hourly.time);
      aqiVal = a.hourly.european_aqi[aqiIdx];
    }
    const aqiNum = typeof aqiVal === 'number' ? aqiVal : 0;

    const sunrise = w.daily.sunrise[0];
    const sunset = w.daily.sunset[0];
    const sunProg = sunProgress(sunrise, sunset);

    const now = new Date();
    const dateStr = now.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    let html = '';

    html += '<div class="card col-6 current-weather">';
    html += '<div>';
    html += '<div class="city-name">' + escapeHtml(state.cityName) + '</div>';
    html += '<div class="date-time">' + escapeHtml(dateStr) + '</div>';
    html += '</div>';
    html += '<div class="temp-row">';
    html += '<div class="big-number">' + toUnit(cw.temperature) + '<span style="font-size:2rem;font-weight:400">' + unitSymbol() + '</span></div>';
    html += '<div class="weather-icon">' + info.icon() + '</div>';
    html += '</div>';
    html += '<div class="description">' + info.desc + '</div>';
    html += '</div>';

    html += '<div class="card col-6">';
    html += '<div class="label">Statystyki</div>';
    html += '<div class="stats-grid">';
    html += statItem('Wiatr', windSpeed + ' km/h');
    html += statItem('Wilgotność', humidity + '%');
    html += statItem('Ciśnienie', pressure + ' hPa');
    html += statItem('Indeks UV', uvIndex);
    html += statItem('Widoczność', visibility + ' km');
    html += statItem('Zachmurzenie', info.desc);
    html += '</div>';
    html += '<div style="margin-top:20px">';
    html += '<div class="label">Wschód / Zachód słońca</div>';
    html += '<div class="sun-times">';
    html += '<div><div class="label">Wschód</div><div class="sun-time-value">' + formatSunTime(sunrise) + '</div></div>';
    html += '<div style="text-align:right"><div class="label">Zachód</div><div class="sun-time-value">' + formatSunTime(sunset) + '</div></div>';
    html += '</div>';
    html += '<div class="sun-progress-track"><div class="sun-progress-bar" id="sunBar"></div><div class="sun-progress-dot" id="sunDot"></div></div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="card col-12">';
    html += '<div class="label">Prognoza godzinowa — 24h</div>';
    html += '<div class="hourly-scroll">';
    for (let i = 0; i < 24; i += 2) {
      const idx = hourIdx + i;
      if (idx >= w.hourly.time.length) break;
      const hCode = w.hourly.weathercode ? w.hourly.weathercode[idx] : guessHourWeatherCode(w, idx);
      const hInfo = weatherInfo(hCode);
      html += '<div class="hourly-item">';
      html += '<div class="hourly-time">' + formatHour(w.hourly.time[idx]) + '</div>';
      html += '<div class="hourly-icon">' + hInfo.icon() + '</div>';
      html += '<div class="hourly-temp">' + toUnit(w.hourly.temperature_2m[idx]) + '°</div>';
      html += '<div class="hourly-precip">' + (w.hourly.precipitation_probability[idx] || 0) + '%</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';

    html += '<div class="card col-12">';
    html += '<div class="label">Wykres temperatury 24h</div>';
    html += '<div class="chart-container">' + buildTempChart(w.hourly.time, w.hourly.temperature_2m, hourIdx) + '</div>';
    html += '</div>';

    html += '<div class="card col-8">';
    html += '<div class="label">Prognoza 7-dniowa</div>';
    html += '<table class="forecast-table">';
    html += '<thead><tr><th>Dzień</th><th>Max</th><th>Min</th><th>Opady</th><th></th></tr></thead>';
    html += '<tbody>';
    for (let i = 0; i < w.daily.time.length; i++) {
      const dInfo = weatherInfo(w.daily.weathercode[i]);
      const dn = i === 0 ? 'Dziś' : shortDay(w.daily.time[i]);
      html += '<tr>';
      html += '<td class="day-name">' + dn + '</td>';
      html += '<td class="temp-max">' + toUnit(w.daily.temperature_2m_max[i]) + '°</td>';
      html += '<td class="temp-min">' + toUnit(w.daily.temperature_2m_min[i]) + '°</td>';
      html += '<td>' + (w.daily.precipitation_sum[i] || 0) + ' mm</td>';
      html += '<td>' + dInfo.icon() + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    html += '<div class="card col-4">';
    html += '<div class="label">Jakość powietrza</div>';
    html += '<div class="aqi-value">' + aqiVal + '</div>';
    html += '<div class="aqi-desc">' + (typeof aqiVal === 'number' ? aqiDescription(aqiVal) : 'Brak danych dla tej lokalizacji') + '</div>';
    html += '<div class="aqi-bar-track"><div class="aqi-bar-fill" id="aqiBar"></div></div>';
    html += '<div style="margin-top:12px"><span class="label">Europejski AQI</span></div>';
    html += '</div>';

    const hourlyEl = document.querySelector('.hourly-scroll');
    const savedScroll = hourlyEl ? hourlyEl.scrollLeft : 0;

    document.getElementById('app').innerHTML = html;

    const newHourlyEl = document.querySelector('.hourly-scroll');
    if (newHourlyEl) newHourlyEl.scrollLeft = savedScroll;

    requestAnimationFrame(() => {
      const sunBar = document.getElementById('sunBar');
      const sunDot = document.getElementById('sunDot');
      if (sunBar) sunBar.style.width = sunProg + '%';
      if (sunDot) sunDot.style.left = sunProg + '%';
      const aqiBar = document.getElementById('aqiBar');
      if (aqiBar) aqiBar.style.width = aqiPercent(aqiNum) + '%';
    });
  }

  function statItem(label, value) {
    return '<div class="stat-item"><div class="label">' + label + '</div><div class="stat-value">' + value + '</div></div>';
  }

  function guessHourWeatherCode(w, idx) {
    if (!w.daily || !w.daily.weathercode) return 0;
    const hourTime = new Date(w.hourly.time[idx]);
    const dayIdx = w.daily.time.findIndex(d => {
      const dd = new Date(d + 'T00:00:00');
      return dd.toDateString() === hourTime.toDateString();
    });
    return dayIdx >= 0 ? w.daily.weathercode[dayIdx] : 0;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  fetchAll();
})();
</script>
</body>
</html>
